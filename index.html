<!DOCTYPE html>
<html>
<head>
    <title>Phone Number Tracker</title>
</head>

<body>

<h2>Phone Number Tracker</h2>

<form method="POST">
    <input type="text" name="number" placeholder="+919876543210" required>
    <button type="submit">Track</button>
</form>

<h3>Location: {{ location }}</h3>
<h3>Carrier: {{ service }}</h3>

</body>
</html>
